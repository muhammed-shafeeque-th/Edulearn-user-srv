syntax = "proto3";
package user_service;

import "user/common.proto";

//  ENUMS

enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  ACTIVE = 1;
  BLOCKED = 2;
  DELETED = 3;
}

// FILTERS

message UserFilter {
  optional UserStatus status = 1;
  optional string email = 2;
  optional string role = 3;
  optional string search = 4;
}

// USER MODELS

message UserProfileData {
  optional string bio = 1;
  optional string phone = 2;
  optional string country = 3;
  optional string city = 4;
  optional string gender = 5;
  optional string preference = 6;
  optional string language = 7;
  optional string website = 8;
}

message UserSocialsData {
  string provider = 1;
  string profile_url = 2;
  string provider_user_url = 3;
}

message InstructorProfileData {
  string bio = 1;
  string headline = 2;
  string experience = 3;
  string certificate = 4;
  string expertise = 5;
  double rating = 6;
  repeated string tags = 7;
  int32 total_ratings = 8;
  int32 total_courses = 9;
  int32 total_students = 10;
  string joined_at = 11;
   string education = 12;
}

message UserData {
  string id = 1;
  string email = 2;
  string role = 3;
  string first_name = 4;
  string last_name = 5;
  string username = 6;
  string slug = 7;
  string avatar = 8;
  string status = 9;
  string last_login = 10;
  UserProfileData profile = 11;
  InstructorProfileData instructor_profile = 12;
  repeated UserSocialsData socials = 13;
  string updated_at = 14;
  string created_at = 15;
  map<string, string> role_status = 16;
}

message UserMeta {
  string id = 1;
  string email = 2;
  string role = 3;
  string first_name = 4;
  string last_name = 5;
  string avatar = 8;
  string status = 9;
  string last_login = 10;
  string updated_at = 11;
  string created_at = 12;
  optional string city = 6;
  optional string phone = 7;
  optional string country = 13;
  optional string bio = 14;
  optional string gender = 15;
  map<string, string> role_status = 16;
}


// USER REQUESTS

message ListUsersRequest {
  PaginationRequest pagination = 1;
  UserFilter filter = 2;
  SortOption sort = 3;
}


message GetUserRequest {
  string user_id = 1;
}

message ListUsersByIdsRequest {
  repeated string user_ids = 1;
}


message GetUserEmailsRequest {}

message CheckUserByEmailRequest {
  string email = 1;
}

message GetCurrentUserRequest {
  string user_id = 1;
}

message BlockAccountRequest {
  string user_id = 1;
}

message UnBlockAccountRequest {
  string user_id = 1;
}


message UpdateUserDetailsRequest {
  string user_id = 1;
  optional string first_name = 2;
  optional string last_name = 3;
  optional string phone = 4;
  repeated UserSocialsData socials = 5;
  optional string biography = 6;
  optional string avatar = 7;
  optional string website = 8;
  optional string language = 9;
  optional string city = 10;
  optional string country = 11;
  optional string gender = 12;
}

message ChangePasswordRequest {
  string user_id = 1;
  string old_password = 2;
  string new_password = 3;
}

//          USER RESPONSES

message UserEmailsSuccess {
  repeated string emails = 1;
}

message EmailExist {
  bool exists = 1;
  string error = 2;
}

message UsersMetaSuccess {
  repeated UserMeta users = 1;
  PaginationResponse pagination = 2;
}


message UsersSuccess {
  repeated UserData users = 1;
  PaginationResponse pagination = 2;
}

message UsersResponse {
  repeated UserData users = 1;
}

message ListUsersResponse {
  oneof result {
    UsersMetaSuccess users = 1;
    Error error = 2;
  }
}


message GetUserEmailsResponse {
  oneof result {
    UserEmailsSuccess success = 1;
    Error error = 2;
  }
}

message GetUserResponse {
  oneof result {
    UserData user = 1;
    Error error = 2;
  }
}

message GetCurrentUserResponse {
  oneof result {
    UserData user = 1;
    Error error = 2;
  }
}
message CheckUserByEmailResponse {
  oneof result {
    EmailExist response = 1;
    Error error = 2;
  }
}
message BlockAccountResponse {
  oneof result {
    BlockAccountSuccess success = 1;
    Error error = 2;
  }
}
message UnBlockAccountResponse {
  oneof result {
    UnBlockAccountSuccess success = 1;
    Error error = 2;
  }
}
message BlockAccountSuccess {
  bool updated = 1;
}
message UnBlockAccountSuccess {
  bool updated = 1;
}

message UpdateUserDetailsResponse {
  oneof result {
    UserData user = 1;
    Error error = 2;
  }
}
message ChangePasswordResponse {
  oneof result {
    ChangePasswordSuccess success = 1;
    Error error = 2;
  }
}
message ChangePasswordSuccess {
  bool updated = 1;
}